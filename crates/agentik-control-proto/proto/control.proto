syntax = "proto3";

package agentik.control.v1;

// Control-plane service exposed by the agentik runtime daemon. The frontend
// (CLI / TUI / future web) drives agent lifecycle and observes the aggregated
// event stream through this service.
//
// Complex payloads (AgentSpawnOpts, Vec<ContentBlock>, ModelConfig,
// AgentLifecycleStatus, ProcessEvent) are carried as JSON strings
// (`*_json` fields) and serde-round-tripped on both ends. This keeps the proto
// small and avoids modelling nested SDK wire types (Message, Usage, Value).
service AgentControlService {
  // Spawn a new agent by registered kind. Returns its agent_id.
  rpc SpawnAgent(SpawnAgentRequest) returns (SpawnAgentResponse);
  // Start a spawned agent (IDLE -> RUNNING).
  rpc StartAgent(AgentIdRequest) returns (Ack);
  // Stop a running agent.
  rpc StopAgent(AgentIdRequest) returns (Ack);
  // Restart an agent (cancel -> rebuild -> re-register).
  rpc RestartAgent(AgentIdRequest) returns (Ack);
  // Inject a user message into an agent's memory.
  rpc InjectMessage(InjectMessageRequest) returns (Ack);
  // List all managed agents with their kind and status.
  rpc ListAgents(Empty) returns (ListAgentsResponse);
  // Get the lifecycle status of one agent.
  rpc GetStatus(AgentIdRequest) returns (StatusResponse);
  // Get the model names currently in the shared pool.
  rpc GetPoolModels(Empty) returns (GetPoolModelsResponse);
  // Configure the shared model pool from a ModelConfig.
  rpc ConfigurePool(ConfigurePoolRequest) returns (Ack);
  // List registered agent kinds.
  rpc ListKinds(Empty) returns (ListKindsResponse);
  // Subscribe to the aggregated ProcessEvent stream for all agents.
  rpc StreamEvents(Empty) returns (stream EventEnvelope);
  // Shut the daemon down gracefully.
  rpc Shutdown(Empty) returns (Ack);
  // Liveness probe (used by `daemon status`).
  rpc Ping(Empty) returns (Ack);

  // ── Skill tree management ──
  // List skills, optionally filtered. Returns JSON [SkillWire].
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  // Get a single skill by name/alias. Returns JSON SkillWire.
  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse);
  // Get the full skill tree. Returns JSON SkillTreeNodeWire.
  rpc GetSkillTree(Empty) returns (GetSkillTreeResponse);
  // Reload a single skill from its source.
  rpc ReloadSkill(ReloadSkillRequest) returns (ReloadSkillResponse);
  // Import all skills from a directory into the store (full replace), then
  // refresh registered agent kinds so new spawns reflect the change.
  rpc ImportSkills(ImportSkillsRequest) returns (ImportResult);
  // Export all skills from the store to a directory.
  rpc ExportSkills(ExportSkillsRequest) returns (ImportResult);
  // Subscribe to skill change notifications.
  rpc WatchSkills(Empty) returns (stream SkillChangeEnvelope);
}

message Empty {}

message Ack {
  bool ok = 1;
  string error = 2;
}

message AgentIdRequest {
  string agent_id = 1;
}

message SpawnAgentRequest {
  string kind = 1;
  // JSON-serialised AgentSpawnOpts.
  string opts_json = 2;
}

message SpawnAgentResponse {
  oneof result {
    string agent_id = 1;
    string error = 2;
  }
}

message InjectMessageRequest {
  string agent_id = 1;
  // JSON-serialised Vec<ContentBlock>.
  string content_json = 2;
}

message AgentInfo {
  string agent_id = 1;
  string kind = 2;
  // JSON-serialised AgentLifecycleStatus.
  string status_json = 3;
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message StatusResponse {
  // JSON-serialised AgentLifecycleStatus.
  string status_json = 1;
}

message GetPoolModelsResponse {
  repeated string models = 1;
}

message ConfigurePoolRequest {
  // JSON-serialised ModelConfig.
  string config_json = 1;
}

message ListKindsResponse {
  repeated string kinds = 1;
}

message EventEnvelope {
  // JSON-serialised ProcessEvent.
  string payload_json = 1;
}

// ── Skill messages ────────────────────────────────────────────

message ListSkillsRequest {
  bool user_invocable_only = 1;
  bool model_invocable_only = 2;
}

message ListSkillsResponse {
  // JSON-serialised [SkillWire].
  string skills_json = 1;
}

message GetSkillRequest {
  string name = 1;
}

message GetSkillResponse {
  oneof result {
    // JSON-serialised SkillWire.
    string skill_json = 1;
    string error = 2;
  }
}

message GetSkillTreeResponse {
  oneof result {
    // JSON-serialised SkillTreeNodeWire.
    string tree_json = 1;
    string error = 2;
  }
}

message ReloadSkillRequest {
  string name = 1;
}

message ReloadSkillResponse {
  oneof result {
    // JSON-serialised SkillWire (reloaded skill).
    string skill_json = 1;
    // Skill unchanged.
    string not_changed = 2;
    string error = 3;
  }
}

message ImportSkillsRequest {
  string dir = 1;
}

message ExportSkillsRequest {
  string dir = 1;
}

message ImportResult {
  uint32 count = 1;
  string error = 2;
}

message SkillChangeEnvelope {
  // JSON-serialised SkillChangeNotificationWire.
  string payload_json = 1;
}
